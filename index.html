<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Mobile Responsive -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Expense Tracker</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Dashboard Heading -->
    <h1>Expense Tracker Dashboard</h1>

    <!-- Dashboard -->
    <div class="dashboard">

        <!-- Income Section -->
        <div class="box">
            <h3>Total Income</h3>
            <p id="income">₹0</p>
        </div>

        <!-- Expense Section -->
        <div class="box">
            <h3>Total Expense</h3>
            <p id="expense">₹0</p>
        </div>

        <!-- Balance Section -->
        <div class="box">
            <h3>Balance</h3>
            <p id="balance">₹0</p>
        </div>

    </div>

    <!-- Add Transaction -->
    <h2>Add Transaction</h2>

    <!-- Input Section -->
    <div class="form">
        <input type="text" id="desc" placeholder="Enter Description">

        <input type="number" id="amount" placeholder="Enter Amount">

        <button onclick="addIncome()">Add Income</button>

        <button onclick="addExpense()">Add Expense</button>
    </div>

    <!-- Transaction History -->
    <h2>Transaction History</h2>

    <ul id="list"></ul>

    <!-- JavaScript File -->
    <script src="script.js"></script>

</body>
</html>
